<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIZ.IO - Absolute Armor V13</title>
    <style>
        :root { --bg: #000; --main: #fff; --line: #1a1a1a; }
        body { background: var(--bg); color: var(--main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { width: 900px; height: 600px; border: 1px solid var(--line); display: flex; flex-direction: column; background: #000; }
        .header { padding: 15px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; background: var(--line); gap: 1px; }
        textarea { width: 100%; height: 100%; background: #000; color: #fff; border: none; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; resize: none; outline: none; box-sizing: border-box; line-height: 1.5; }
        .footer { padding: 20px; border-top: 1px solid var(--line); text-align: center; }
        button { background: #fff; color: #000; border: none; padding: 10px 80px; font-weight: 900; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #ccc; letter-spacing: 4px; }
        .label { position: absolute; padding: 5px 10px; font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 2px; z-index: 5; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="header">
            <div style="letter-spacing: 8px; font-weight: 900;">NEIZ.IO</div>
            <div style="color: #444; font-size: 8px;">[V13_CONTENT_DEPENDENT_VM]</div>
        </div>
        <div class="main">
            <div style="position: relative; background: #000;">
                <div class="label">Input Logic</div>
                <textarea id="raw" placeholder="-- Paste script here..."></textarea>
            </div>
            <div style="position: relative; background: #000;">
                <div class="label">Secure VM Output</div>
                <textarea id="out" readonly placeholder="-- Obfuscated result..."></textarea>
            </div>
        </div>
        <div class="footer">
            <button onclick="build()">Secure Build</button>
        </div>
    </div>

    <script>
        function build() {
            const input = document.getElementById('raw').value;
            if(!input) return;

            let seed = Math.floor(Math.random() * 150) + 50;
            let currentKey = seed;
            let instructions = [];

            for(let i=0; i<input.length; i++) {
                let charCode = input.charCodeAt(i);
                // Encryption: Byte = (Char + currentKey) % 256
                let encrypted = (charCode + currentKey) % 256;
                instructions.push(encrypted);
                // Update Key based on the ACTUAL character (Content Dependent)
                currentKey = (currentKey + charCode + i) % 256;
            }

            const data = instructions.join(',');
            
            // Minified, Content-Dependent Decryption Loop
            const vm = `task.spawn(function()local d,k,r,c={${data}},${seed},{},0 for i=1,#d do c=(d[i]-k)%256 r[i]=string.char(c)k=(k+c+i-1)%256 end local f=loadstring(table.concat(r))setfenv(f,getfenv())f()end)`;

            document.getElementById('out').value = vm;
        }
    </script>
</body>
</html>
