<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIZ.IO - Builder</title>
    <style>
        :root { --bg: #000; --main: #fff; --line: #1a1a1a; }
        body { background: var(--bg); color: var(--main); font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { width: 1000px; height: 700px; border: 1px solid var(--line); display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .config { padding: 10px 20px; background: #050505; border-bottom: 1px solid var(--line); display: flex; gap: 20px; align-items: center; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 5px 10px; font-family: monospace; font-size: 11px; width: 250px; }
        .main { flex: 1; display: grid; grid-template-rows: 1fr 1fr; background: var(--line); gap: 1px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; }
        textarea { background: var(--bg); color: var(--main); border: none; padding: 15px; font-size: 11px; resize: none; outline: none; }
        .label { position: absolute; font-size: 9px; color: #444; padding: 5px; text-transform: uppercase; }
        .footer { padding: 20px; border-top: 1px solid var(--line); text-align: center; }
        button { background: #fff; color: #000; border: none; padding: 10px 60px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="header">
            <div style="letter-spacing: 5px;">NEIZ.IO BUILDER</div>
            <div style="color: #444; font-size: 10px;">PRO VERSION</div>
        </div>
        <div class="config">
            <span>Domain:</span>
            <input id="dom" type="text" value="neiz-scripts.vercel.app" placeholder="neiz.io">
            <span style="color: #444; font-size: 10px;">(Change this to your actual Vercel or Custom Domain)</span>
        </div>
        <div class="main">
            <div style="position: relative; background: #000;">
                <div class="label">Source Code</div>
                <textarea id="raw" style="width: 100%; height: 100%;"></textarea>
            </div>
            <div class="row">
                <div style="position: relative; background: #000;">
                    <div class="label">Roblox Loader</div>
                    <textarea id="loader" readonly style="width: 100%; height: 100%;"></textarea>
                </div>
                <div style="position: relative; background: #000;">
                    <div class="label">Encrypted Content</div>
                    <textarea id="content" readonly style="width: 100%; height: 100%;"></textarea>
                </div>
            </div>
        </div>
        <div class="footer">
            <button onclick="build()">Generate Build</button>
        </div>
    </div>

    <script>
        const v = () => '_' + Math.random().toString(36).substring(2, 10).toUpperCase();
        function build() {
            const input = document.getElementById('raw').value;
            const domain = document.getElementById('dom').value;
            if(!input) return;

            let seed = Math.floor(Math.random() * 100) + 50;
            let salt = Math.floor(Math.random() * 15) + 2;
            let bytecode = [];
            let key = seed;

            for(let i=0; i<input.length; i++) {
                bytecode.push((input.charCodeAt(i) ^ key) + salt);
                key = (key + salt) % 256;
            }

            const a = v(); const b = v(); const c = v(); const d = v();
            const vm = `local ${a}={${bytecode.join(',')}} local ${b}=${seed} local ${c}="" for i=1,#${a} do ${c}=${c}..string.char(bit32.bxor(${a}[i]-${salt},${b})) ${b}=(${b}+${salt})%256 end local ${d}=loadstring or load return ${d}(${c})()`;

            const id = (Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10)).toUpperCase();
            
            document.getElementById('loader').value = `loadstring(game:HttpGet("https://${domain}/v4/loader/${id}.lua"))()`;
            document.getElementById('content').value = vm;
        }
    </script>
</body>
</html>
