<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIZ.IO - VM Protection</title>
    <style>
        :root { --bg: #000; --main: #fff; --line: #1a1a1a; }
        body { background: var(--bg); color: var(--main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .ui { width: 1100px; height: 750px; border: 1px solid var(--line); display: flex; flex-direction: column; background: #000; }
        .header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--line); gap: 1px; }
        .input-box { flex: 1.5; background: #000; position: relative; }
        .output-row { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; }
        textarea { width: 100%; height: 100%; background: #000; color: #fff; border: none; padding: 25px; font-family: 'JetBrains Mono', monospace; font-size: 11px; resize: none; outline: none; box-sizing: border-box; }
        .label { position: absolute; top: 5px; left: 10px; font-size: 8px; color: #444; text-transform: uppercase; z-index: 10; letter-spacing: 1px; }
        .footer { padding: 20px; border-top: 1px solid var(--line); text-align: center; }
        button { background: #fff; color: #000; border: none; padding: 12px 80px; font-weight: 900; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; }
        button:hover { letter-spacing: 4px; background: #ccc; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="header">
            <div style="letter-spacing: 10px; font-weight: 900;">NEIZ.IO</div>
            <div style="color: #444; font-size: 9px; font-weight: bold;">VIRTUAL MACHINE EMULATION [V4.0.1]</div>
        </div>
        <div class="main">
            <div class="input-box">
                <div class="label">Input Source</div>
                <textarea id="raw" placeholder="-- Paste code here..."></textarea>
            </div>
            <div class="output-row">
                <div style="position: relative; background: #000;">
                    <div class="label">Roblox Loader</div>
                    <textarea id="loader" readonly placeholder="-- Loader string will appear here"></textarea>
                </div>
                <div style="position: relative; background: #000;">
                    <div class="label">GitHub File Content (VM)</div>
                    <textarea id="content" readonly placeholder="-- Obfuscated logic will appear here"></textarea>
                </div>
            </div>
        </div>
        <div class="footer">
            <button onclick="build()">Secure Build</button>
        </div>
    </div>

    <script>
        const v = () => '_' + Math.random().toString(36).substring(2, 12).toUpperCase();
        function build() {
            const input = document.getElementById('raw').value;
            if(!input) return;

            // VM Configuration
            let seed = Math.floor(Math.random() * 1000) + 500;
            let salt = Math.floor(Math.random() * 20) + 5;
            let currentKey = seed;
            
            // Generate Virtual Bytecode
            let instructions = [];
            for(let i=0; i<input.length; i++) {
                let char = input.charCodeAt(i);
                // The encryption key changes based on a mathematical formula for EVERY byte
                instructions.push((char ^ currentKey) + salt);
                currentKey = Math.floor((currentKey + salt) % 256);
            }

            const data = instructions.join(',');
            
            // Randomize VM variable names (Luraph Style)
            const VM_TABLE = v();
            const VM_PC = v();
            const VM_RES = v();
            const VM_KEY = v();
            const VM_DISPATCH = v();

            // The VM Logic that goes on GitHub
            // It simulates a processor executing instructions
            const vmCode = `--[[ NEIZ.IO VM PROTECT ]]
local ${VM_TABLE} = {${data}}
local ${VM_KEY} = ${seed}
local ${VM_PC} = 1
local ${VM_RES} = ""
local function ${VM_DISPATCH}(n)
    local d = string.char(bit32.bxor(n - ${salt}, ${VM_KEY}))
    ${VM_KEY} = (${VM_KEY} + ${salt}) % 256
    return d
end
while ${VM_PC} <= #${VM_TABLE} do
    ${VM_RES} = ${VM_RES} .. ${VM_DISPATCH}(${VM_TABLE}[${VM_PC}])
    ${VM_PC} = ${VM_PC} + 1
end
local _exec = loadstring or load
local _run, _err = _exec(${VM_RES})
if _run then 
    _run() 
else 
    error("VM_CRITICAL_REJECT: " .. tostring(_err)) 
end
${VM_RES} = nil
${VM_TABLE} = nil`;

            const id = (Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10)).toUpperCase();
            
            document.getElementById('loader').value = `loadstring(game:HttpGet("https://neiz-scripts.vercel.app/v4/loader/${id}.lua"))()`;
            document.getElementById('content').value = vmCode;
        }
    </script>
</body>
</html>
